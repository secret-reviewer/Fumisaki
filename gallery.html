<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Secret Reviewer</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link href="https://googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #ff0000; --bg: #0a0a0a; --text: #ececec; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    
    nav { display: flex; justify-content: center; gap: 30px; padding: 20px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
    nav a { color: #fff; text-decoration: none; font-weight: 600; font-size: 0.8rem; opacity: 0.6; text-transform: uppercase; }
    nav a:hover { opacity: 1; color: var(--primary); }

    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    h1 { text-align: center; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); }

    /* The Photo Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      grid-auto-rows: 250px;
      gap: 15px;
    }

    .gallery-item { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid #333; transition: 0.3s; }
    .gallery-item:hover { transform: scale(1.03); border-color: var(--primary); cursor: pointer; }

    footer { text-align: center; padding: 60px; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="gallery.html">Gallery</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="container">
  <h1>Road Photos</h1>
  
  <div class="gallery-grid">
    <!-- Replace 'bike1.jpg' etc. with your actual file names -->
    <img src="IMG_5468.JPG" class="gallery-item" alt="Route 41">
    <img src="IMG_5651.JPG" class="gallery-item" alt="Rider's Corner">
    <img src="IMG_5735.JPG" class="gallery-item" alt="Highest Point in Thailand">
    <img src="IMG_5830.JPG" class="gallery-item" alt="The most scary best scenary">
  </div>
</div>

<footer>© 2026 Secret Reviewer | Ride Safe 🏍️</footer>

</body>
</html>
