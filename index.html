<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="referrer" content="no-referrer-when-downgrade"> <!-- CRITICAL for YouTube on Cloudflare -->
  <title>Secret Reviewer | Motorcycle Blog</title>
  <style>
    :root { --primary: #ff0000; --bg: #0a0a0a; --text: #ececec; }
    body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); }
    
    /* Simplified Nav to avoid 'Invisible Wall' bugs */
    nav { 
      background: #000; 
      padding: 15px; 
      text-align: center; 
      border-bottom: 1px solid #333;
    }
    nav a { 
      color: #fff; 
      text-decoration: none; 
      margin: 0 15px; 
      font-weight: bold;
      display: inline-block; /* Essential for mobile clicking */
      padding: 10px; 
    }
    .nav-yt { color: var(--primary); border: 1px solid var(--primary); border-radius: 4px; }

    .container { max-width: 800px; margin: 20px auto; padding: 20px; }
    
    /* Absolute simplest video embed for troubleshooting */
    .vid-box { 
      width: 100%; 
      aspect-ratio: 16 / 9; 
      background: #111; 
      margin: 20px 0;
      border-radius: 8px;
      overflow: hidden;
    }
    iframe { width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="https://youtube.com" target="_blank" class="nav-yt">Visit YouTube Channel</a>
</nav>

<div class="container">
  <h1>Secret Reviewer</h1>
  <p>Motorcycle Reviewer & Traveler</p>

  <div class="vid-box">
    <!-- Using standard embed URL -->
    <iframe src="https://youtube.com" allowfullscreen></iframe>
  </div>
  
  <p>If you see a black box above, please check if you have <b>iCloud Private Relay</b> or an <b>Ad-Blocker</b> turned on.</p>
</div>

</body>
</html>
