<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secret Reviewer | Motorcycle Blog</title>
  <style>
    :root { --primary: #ff0000; --bg: #0a0a0a; --card: #161616; --text: #ececec; }
    body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    
    /* NAV FIX: Ensuring nav doesn't cover the screen */
    nav { 
      display: flex; 
      justify-content: center; 
      gap: 20px; 
      padding: 20px; 
      background: #000; 
      position: relative; 
      z-index: 9999; 
    }
    nav a { 
      color: #fff; 
      text-decoration: none; 
      font-weight: bold; 
      padding: 10px; /* Makes clicking easier */
    }
    .nav-yt { color: var(--primary); }

    header { 
      padding: 60px 20px; 
      text-align: center; 
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://unsplash.com');
      background-size: cover;
      border-bottom: 4px solid var(--primary);
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    
    /* VIDEO FIX: Removed fancy CSS to see if it loads simply */
    .video-section { margin: 40px 0; text-align: center; }
    .video-container { 
      position: relative; 
      padding-bottom: 56.25%; 
      height: 0; 
      background: #111; 
      border-radius: 12px;
      overflow: hidden;
    }
    .video-container iframe {
      position: absolute; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      border: 0;
    }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .post { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #333; }
    .post h2 { color: #fff; margin-top: 10px; }
    .tag { color: var(--primary); font-weight: bold; font-size: 0.8rem; }
    a { text-decoration: none; color: inherit; }

    footer { text-align: center; padding: 40px; border-top: 1px solid #333; color: #666; }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="gallery.html">Gallery</a>
  <a href="contact.html">Contact</a>
  <a href="https://youtube.com" target="_blank" class="nav-yt">YouTube Channel</a>
</nav>

<header>
  <h1>Secret Reviewer</h1>
  <p>Motorcycle Blogger | Accessories | Trips</p>
</header>

<div class="container">
  
  <div class="video-section">
    <h3>Latest Ride: Malaysia to Thailand</h3>
    <div class="video-container">
      <!-- Standard Embed Code -->
      <iframe src="https://youtube.com" allowfullscreen></iframe>
    </div>
  </div>

  <div class="grid">
    <a href="accessories.html"><div class="post"><span class="tag">REVIEW</span><h2>Accessories</h2></div></a>
    <a href="thailand-trip.html"><div class="post"><span class="tag">TRIP</span><h2>Thailand Ride</h2></div></a>
    <a href="electrical-mods.html"><div class="post"><span class="tag">MODS</span><h2>Electrical</h2></div></a>
    <a href="beyond-riding.html"><div class="post"><span class="tag">LIFE</span><h2>Stories</h2></div></a>
  </div>

</div>

<footer>© 2026 Secret Reviewer</footer>

</body>
</html>
